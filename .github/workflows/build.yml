name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Debug - Check Tauri CLI version and config
        shell: pwsh
        run: |
          Write-Host "=== Tauri CLI Version ==="
          pnpm tauri --version
          
          Write-Host "=== Tauri Info ==="
          pnpm tauri info
          
          Write-Host "=== Check file encoding ==="
          $content = Get-Content "tauri.conf.json" -Raw
          Write-Host "File length: $($content.Length)"
          Write-Host "First 100 chars: $($content.Substring(0, [Math]::Min(100, $content.Length)))"
      
      - name: Build frontend
        run: pnpm run build
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      
      - name: Build Tauri app
        shell: pwsh
        run: |
          Write-Host "=== Running tauri build from: $(Get-Location)"
          pnpm tauri build
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: src-tauri/target/release/bundle/nsis/*.exe
