name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Verify Tauri CLI version
        run: pnpm tauri --version
      
      - name: Debug - Check directory structure
        shell: pwsh
        run: |
          Write-Host "=== Current directory ==="
          Get-Location
          
          Write-Host "=== Check tauri.conf.json files ==="
          if (Test-Path "tauri.conf.json") { 
            Write-Host "Root tauri.conf.json exists"
            Get-Content "tauri.conf.json"
          } else {
            Write-Host "Root tauri.conf.json NOT FOUND"
          }
          
          if (Test-Path "src-tauri/tauri.conf.json") { 
            Write-Host "src-tauri/tauri.conf.json exists"
          } else {
            Write-Host "src-tauri/tauri.conf.json NOT FOUND"
          }
      
      - name: Build frontend
        run: pnpm run build
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      
      - name: Build Tauri app
        run: pnpm tauri build
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: src-tauri/target/release/bundle/nsis/*.exe
