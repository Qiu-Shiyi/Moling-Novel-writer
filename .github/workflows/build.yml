name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install
      
      - name: Build frontend
        run: pnpm run build
      
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build Tauri app
        run: pnpm tauri build
      
      - name: List all target directories
        shell: pwsh
        run: |
          Write-Host "=== Checking target directory ==="
          if (Test-Path "target") { Get-ChildItem -Path target -Recurse -Directory }
          if (Test-Path "src-tauri/target") { Get-ChildItem -Path src-tauri/target -Recurse -Directory }
          Write-Host "=== Searching for .exe files ==="
          Get-ChildItem -Path . -Filter "*.exe" -Recurse -ErrorAction SilentlyContinue | Select-Object FullName
      
      - name: Upload artifact (try all possible paths)
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe
            **/bundle/**/*.exe
          if-no-files-found: warn
